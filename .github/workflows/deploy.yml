# ============================================================
#  frontend-repo — .github/workflows/deploy.yml
#
#  Flow:
#    push to main
#      → Build Angular 8 image
#      → Push icubedev/frontendtestcicd:{latest, sha}
#      → SSH to VM → docker compose pull frontend
#                  → docker compose up -d frontend
#                  → docker network connect (ถ้า network ยังไม่ attach)
#
#  Secrets ที่ต้องตั้งใน repo นี้:
#    DOCKERHUB_USERNAME   Docker Hub username
#    DOCKERHUB_TOKEN      Docker Hub access token
#    VM_HOST              IP / hostname ของ VM
#    VM_USER              SSH user (เช่น ubuntu)
#    VM_SSH_KEY           SSH private key
#    VM_PROJECT_PATH      path ของ docker-compose.yml บน VM
#                         เช่น /home/ubuntu/your-project
# ============================================================

name: Frontend — Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: icubedev/frontendtestcicd
  SERVICE: frontend          # ชื่อ service ใน docker-compose.yml
  CONTAINER: frontend        # ชื่อ container_name ใน docker-compose.yml

jobs:

  # ── 1. Build & Push ────────────────────────────────────────
  build:
    name: 🏗 Build & Push (Angular 8)
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 2. Deploy ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy Frontend to VM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH → Pull & Restart frontend only
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VM_PROJECT_PATH }}

            echo "────────────────────────────────────"
            echo "▶ [Frontend] Pull latest image"
            echo "────────────────────────────────────"
            # pull เฉพาะ service frontend ไม่กระทบ backend
            docker compose pull ${{ env.SERVICE }}

            echo "────────────────────────────────────"
            echo "▶ [Frontend] Recreate container"
            echo "────────────────────────────────────"
            # --no-deps : ไม่ restart service อื่น (backend ยังรันต่อ)
            docker compose up -d --no-deps ${{ env.SERVICE }}

            echo "────────────────────────────────────"
            echo "▶ [Frontend] Attach to icubeserver-network"
            echo "────────────────────────────────────"
            # compose ผูก network ไว้แล้ว step นี้เป็น safety net
            docker network connect icubeserver-network ${{ env.CONTAINER }} 2>/dev/null \
              && echo "✓ connected" \
              || echo "ℹ already connected (skipped)"

            echo "────────────────────────────────────"
            echo "▶ [Frontend] Verify"
            echo "────────────────────────────────────"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" \
              --filter "name=${{ env.CONTAINER }}"

            docker image prune -f
            echo "✅ Frontend deployed — ${{ github.sha }}"
